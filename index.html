<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Generator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-header">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3h4v4H3V3zm0 6h4v4H3V9zm6-6h4v4H9V3zm0 6h4v4H9V9z" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span class="panel-title">Parameters</span>
        </div>

        <div class="panel-body">
          <div class="row-pair">
            <div class="field">
              <label>Width</label>
              <input type="number" id="wInput" min="400" max="1920" step="10" value="1280">
            </div>
            <div class="field">
              <label>Height</label>
              <input type="number" id="hInput" min="200" max="1920" step="10" value="720">
            </div>
          </div>

          <div class="field">
            <label>Filled squares <span class="val" id="cVal">8</span></label>
            <input type="range" id="cInput" min="2" max="20" step="1" value="8">
          </div>

          <div class="field">
            <label>Text size <span class="val" id="fsVal">16 px</span></label>
            <input type="range" id="fsInput" min="8" max="48" step="1" value="16">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M3 8h10M3 12h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="panel-title">Text</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Square 1</label>
            <textarea id="text1Input" rows="3">В реестре
российской
продукции</textarea>
          </div>
          <div class="field">
            <label>Square 2</label>
            <textarea id="text2Input" rows="2">AQDesk K790</textarea>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2.5" y="2.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="6" cy="6" r="1" fill="currentColor"/>
            <path d="M13.5 10l-3-3-5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="panel-title">Image</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Upload</label>
            <label class="file-btn" for="imgFile">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M8 10V2m0 0l-3 3m3-3l3 3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span id="fileName">Choose image…</span>
            </label>
            <input type="file" id="imgFile" accept="image/*">
            <button id="clearImgBtn" class="inline-btn">Clear</button>
          </div>

          <div class="field">
            <label>Fit</label>
            <select id="fitSelect">
              <option value="cover">Cover (fill, crop)</option>
              <option value="contain">Contain (fit, letterbox)</option>
              <option value="fill">Fill (stretch)</option>
            </select>
          </div>

          <div class="field">
            <label>Scale <span class="val" id="scaleVal">100 %</span></label>
            <input type="range" id="scaleInput" min="20" max="200" step="5" value="100">
          </div>

          <div class="hint">Drag the image on canvas to reposition it.</div>
        </div>
      </div>

      <div class="hint-panel">
        Drag outlined squares on the canvas — the colored chain will rebuild automatically from their new position.
      </div>

      <div class="actions">
        <button id="randomBtn" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 5h9m0 0L8 2m3 3L8 8M14 11H5m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Random
        </button>
        <button id="downloadBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download SVG
        </button>
      </div>
    </aside>

    <main class="canvas-area">
      <div class="canvas-outer">
        <div id="canvas"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
