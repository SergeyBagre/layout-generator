<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Generator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="gen-wrap">
    <h1>Layout Generator</h1>

    <div class="controls">
      <div class="ctrl-group">
        <label>Width</label>
        <input type="range" id="wInput" min="400" max="1920" step="10" value="1280">
        <span class="val" id="wVal">1280</span>
      </div>
      <div class="ctrl-group">
        <label>Height</label>
        <input type="range" id="hInput" min="200" max="1080" step="10" value="720">
        <span class="val" id="hVal">720</span>
      </div>
      <div class="ctrl-group">
        <label>Filled squares</label>
        <input type="range" id="cInput" min="2" max="20" step="1" value="8">
        <span class="val" id="cVal">8</span>
      </div>
      <div class="ctrl-group">
        <label>Text size (px)</label>
        <input type="range" id="fsInput" min="8" max="48" step="1" value="16">
        <span class="val" id="fsVal">16</span>
      </div>
      <div class="action-btns">
        <button id="randomBtn">Random ↻</button>
        <button id="downloadBtn">Download SVG ↓</button>
      </div>
    </div>

    <div class="text-controls">
      <div class="text-group">
        <label>Text for square 1</label>
        <textarea id="text1Input">В реестре
российской
продукции</textarea>
      </div>
      <div class="text-group">
        <label>Text for square 2</label>
        <textarea id="text2Input">AQDesk K790</textarea>
      </div>
    </div>

    <div class="image-section">
      <h3>Image in right half</h3>
      <div class="image-controls">
        <div class="file-input-wrap">
          <label>Upload</label>
          <label class="file-input-label" for="imgFile">Choose image…</label>
          <input type="file" id="imgFile" accept="image/*">
          <button id="clearImgBtn">Clear</button>
        </div>
        <div class="ctrl-group">
          <label>Fit</label>
          <select id="fitSelect">
            <option value="cover">Cover (fill, crop)</option>
            <option value="contain">Contain (fit, letterbox)</option>
            <option value="fill">Fill (stretch)</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>Align</label>
          <select id="alignSelect">
            <option value="center">Center</option>
            <option value="top-left">Top left</option>
            <option value="top">Top</option>
            <option value="top-right">Top right</option>
            <option value="left">Left</option>
            <option value="right">Right</option>
            <option value="bottom-left">Bottom left</option>
            <option value="bottom">Bottom</option>
            <option value="bottom-right">Bottom right</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>Scale (%)</label>
          <input type="range" id="scaleInput" min="20" max="200" step="5" value="100">
          <span class="val" id="scaleVal">100</span>
        </div>
      </div>
      <div class="hint">Image fills the right half of the canvas. Scale adjusts resolution relative to the half-canvas area.</div>
    </div>

    <div class="canvas-outer">
      <div id="canvas"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
