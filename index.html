<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор макетов</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel" data-panel="params">
        <button class="panel-header" type="button">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3h4v4H3V3zm0 6h4v4H3V9zm6-6h4v4H9V3zm0 6h4v4H9V9z" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span class="panel-title">Параметры</span>
          <svg class="panel-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5l3.5 3.5 3.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="panel-body">
          <div class="row-pair">
            <div class="field">
              <label>Ширина</label>
              <input type="number" id="wInput" min="300" max="1920" step="10" value="1280">
            </div>
            <div class="field">
              <label>Высота</label>
              <input type="number" id="hInput" min="300" max="1080" step="10" value="720">
            </div>
          </div>
          <div class="field">
            <label>Размер квадрата <span class="val editable" data-target="sqInput" data-suffix=" px" id="sqVal">240 px</span></label>
            <input type="range" id="sqInput" min="60" max="400" step="10" value="240">
          </div>
          <div class="field">
            <label>Количество квадратов <span class="val editable" data-target="cInput" id="cVal">8</span></label>
            <input type="range" id="cInput" min="2" max="30" step="1" value="8">
          </div>
          <div class="field">
            <label>Размер текста в квадратах <span class="val editable" data-target="fsInput" data-suffix=" px" id="fsVal">16 px</span></label>
            <input type="range" id="fsInput" min="8" max="48" step="1" value="16">
          </div>
        </div>
      </div>

      <div class="panel" data-panel="squares">
        <button class="panel-header" type="button">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M3 8h10M3 12h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="panel-title">Текст в квадратах</span>
          <svg class="panel-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5l3.5 3.5 3.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="panel-body">
          <div class="field">
            <label>Квадрат 1</label>
            <textarea id="text1Input" rows="3">В реестре
российской
продукции</textarea>
          </div>
          <div class="field">
            <label>Квадрат 2</label>
            <textarea id="text2Input" rows="2">AQDesk K790</textarea>
          </div>
        </div>
      </div>

      <div class="panel" data-panel="title">
        <button class="panel-header" type="button">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 4h8M8 4v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="panel-title">Заголовок</span>
          <svg class="panel-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5l3.5 3.5 3.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="panel-body">
          <div class="field">
            <label>Текст заголовка</label>
            <textarea id="titleInput" rows="3">Заголовок макета</textarea>
          </div>
          <div class="field">
            <label>Размер шрифта <span class="val editable" data-target="titleFsInput" data-suffix=" px" id="titleFsVal">72 px</span></label>
            <input type="range" id="titleFsInput" min="16" max="200" step="1" value="72">
          </div>
          <div class="hint">Межстрочный интервал связан с размером шрифта. Межбуквенный интервал зафиксирован на −1%.</div>
        </div>
      </div>

      <div class="panel" data-panel="image">
        <button class="panel-header" type="button">
          <svg class="panel-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2.5" y="2.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="6" cy="6" r="1" fill="currentColor"/>
            <path d="M13.5 10l-3-3-5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="panel-title">Изображение</span>
          <svg class="panel-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5l3.5 3.5 3.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="panel-body">
          <div class="field">
            <label>Загрузка</label>
            <label class="file-btn" for="imgFile">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M8 10V2m0 0l-3 3m3-3l3 3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span id="fileName">Выбрать изображение…</span>
            </label>
            <input type="file" id="imgFile" accept="image/*">
            <button id="clearImgBtn" class="inline-btn">Удалить</button>
          </div>
          <div class="field">
            <label>Вписывание</label>
            <select id="fitSelect">
              <option value="contain">Вписать полностью</option>
              <option value="cover">Заполнить с обрезкой</option>
              <option value="fill">Растянуть</option>
            </select>
          </div>
          <div class="field">
            <label>Масштаб <span class="val editable" data-target="scaleInput" data-suffix=" %" id="scaleVal">100 %</span></label>
            <input type="range" id="scaleInput" min="20" max="200" step="5" value="100">
          </div>
          <div class="hint">Перетащите изображение на холсте, чтобы выровнять.</div>
        </div>
      </div>

      <div class="hint-panel">
        Квадраты с обводкой и изображение можно перетаскивать. Круглая кнопка внутри Квадрата 1 перестраивает цепочку.
      </div>

      <div class="actions">
        <button id="exportJpgBtn" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Скачать JPG
        </button>
        <button id="downloadBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Скачать SVG
        </button>
      </div>
    </aside>

    <main class="main-area">
      <div class="canvas-wrap">
        <div id="canvas"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
